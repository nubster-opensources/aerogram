version: 2
updates:
  # Rust dependencies. MSRV is 1.88 (see docs/MSRV_POLICY.md); review any
  # update that would require bumping the minimum supported Rust version.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
