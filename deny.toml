# cargo-deny configuration for Aerogram.
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Transitive advisories in the pre-alpha scaffold, tracked for remediation in issue #1.
ignore = [
    "RUSTSEC-2023-0071", # rsa Marvin Attack: no fixed upstream version published yet.
    "RUSTSEC-2024-0384", # instant unmaintained: pulled transitively.
    "RUSTSEC-2026-0119", # O(n^2) name compression: awaiting a patched proto release.
    "RUSTSEC-2026-0098", # webpki name constraints: awaiting a patched release.
    "RUSTSEC-2026-0099", # webpki wildcard name constraints: awaiting a patched release.
    "RUSTSEC-2026-0104", # webpki CRL parsing panic: awaiting a patched release.
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
]
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
