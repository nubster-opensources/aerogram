pre-commit:
  parallel: false
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    test:
      glob: "*.rs"
      run: cargo test --workspace --all-features

commit-msg:
  commands:
    cog-verify:
      run: cog verify {1}
