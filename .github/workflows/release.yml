name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish in --dry-run mode (no upload)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.88.0"

      - uses: Swatinem/rust-cache@v2
        with:
          key: release

      - name: Determine publish mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "args=--dry-run" >> "$GITHUB_OUTPUT"
            echo "is_dry=true" >> "$GITHUB_OUTPUT"
            echo "Publishing in DRY-RUN mode"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
            echo "is_dry=false" >> "$GITHUB_OUTPUT"
            echo "Publishing for real to crates.io"
          fi

      - name: Make publish-or-skip executable
        run: chmod +x scripts/publish-or-skip.sh

      - name: Publish aerogram-core
        run: ./scripts/publish-or-skip.sh aerogram-core ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-config
        run: ./scripts/publish-or-skip.sh aerogram-config ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-dkim
        run: ./scripts/publish-or-skip.sh aerogram-dkim ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-spf-dmarc
        run: ./scripts/publish-or-skip.sh aerogram-spf-dmarc ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-queue
        run: ./scripts/publish-or-skip.sh aerogram-queue ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-store
        run: ./scripts/publish-or-skip.sh aerogram-store ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-search
        run: ./scripts/publish-or-skip.sh aerogram-search ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-spam
        run: ./scripts/publish-or-skip.sh aerogram-spam ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-events
        run: ./scripts/publish-or-skip.sh aerogram-events ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-auth
        run: ./scripts/publish-or-skip.sh aerogram-auth ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-smtp
        run: ./scripts/publish-or-skip.sh aerogram-smtp ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-jmap
        run: ./scripts/publish-or-skip.sh aerogram-jmap ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-imap
        run: ./scripts/publish-or-skip.sh aerogram-imap ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-api
        run: ./scripts/publish-or-skip.sh aerogram-api ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-admin
        run: ./scripts/publish-or-skip.sh aerogram-admin ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram-server
        run: ./scripts/publish-or-skip.sh aerogram-server ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish aerogram (binary)
        run: ./scripts/publish-or-skip.sh aerogram ${{ steps.mode.outputs.args }} -- "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v v="[$VERSION]" '
            $0 ~ "^## " v {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "No changelog section found for [$VERSION]; using a placeholder."
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." > release-notes.md
          fi
          echo "--- Release notes preview ---"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
